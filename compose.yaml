services:

  # ── Database ─────────────────────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  server:
    build: ./server
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Note: hostname must match the service name above ("database"), not "db".
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    depends_on:
      database:
        condition: service_healthy

  # ── Next.js frontend ──────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      target: dev        # swap to "prod" for a production build
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Browser-side var — points at the server container on the Docker network.
      # When opening the app from the host machine, the browser connects to
      # localhost:8000 (the port published above), so this stays as localhost.
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/conversation
    volumes:
      # Mount source so Next.js hot-reload works during development.
      - ./client:/app
      - /app/node_modules   # keep the container's node_modules isolated
    depends_on:
      - server

volumes:
  postgres_data:
